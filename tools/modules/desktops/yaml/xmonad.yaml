name: xmonad
description: "Xmonad - Haskell tiling window manager"
display_manager: lightdm
status: unsupported

tiers:
  minimal:
    packages:
      - xmonad
      - xmobar
      - lightdm
      - slick-greeter
      - xserver-xorg
      - xterm
      - dbus-x11
      - dmenu
      - dunst
      - feh
      - lm-sensors
      - network-manager-gnome
      - pavucontrol
      - pulseaudio
      - pulseaudio-module-bluetooth
      - thunar
      - xdg-user-dirs

releases:
  bookworm:
    architectures: [arm64, amd64, armhf]
    packages:
      - accountsservice
      - libu2f-udev

  trixie:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - accountsservice
      - libu2f-udev
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  noble:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev

  forky:
    # Debian 14 — pipewire replaces pulseaudio (same as trixie).
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - accountsservice
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  sid:
    # Debian unstable — pipewire replaces pulseaudio (same as trixie/forky).
    # Includes loong64, which is a sid-only Armbian arch.
    architectures: [arm64, amd64, armhf, riscv64, loong64]
    packages:
      - accountsservice
      - libu2f-udev
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  # ── Ubuntu 22.04 LTS / 25.10 / 26.04 ──────────────────────────────

  jammy:
    # Ubuntu 22.04 LTS — polkit split available via SRU;
    # pulseaudio remains default on jammy.
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev

  resolute:
    # Ubuntu 26.04 LTS — same as questing.
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libfido2-1
