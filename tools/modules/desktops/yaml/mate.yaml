name: mate
description: "MATE - traditional GNOME 2 desktop"
display_manager: lightdm
status: supported

packages:
  - mate-desktop-environment
  - mate-desktop-environment-extras
  - lightdm
  - slick-greeter
  - xserver-xorg
  - blueman
  - bluez
  - bluez-tools
  - network-manager-gnome
  - dbus-x11
  - dmz-cursor-theme
  - evince
  - fonts-ubuntu
  - gnome-disk-utility
  - gnome-system-monitor
  - gtk2-engines
  - gtk2-engines-murrine
  - gtk2-engines-pixbuf
  - gvfs-backends
  - libpam-gnome-keyring
  - lm-sensors
  - numix-gtk-theme
  - numix-icon-theme
  - numix-icon-theme-circle
  - pavucontrol
  - printer-driver-all
  - pulseaudio
  - pulseaudio-module-bluetooth
  - spice-vdagent
  - system-config-printer
  - viewnior
  - xdg-user-dirs
  - xdg-user-dirs-gtk

packages_uninstall:
  - brisk-menu
  - mate-indicator-applet
  - mate-indicator-applet-common
  - mate-applet-trash

releases:
  bookworm:
    architectures: [arm64, amd64, armhf]
    packages:
      - accountsservice
      - gnome-calculator
      - libu2f-udev

  trixie:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - accountsservice
      - libu2f-udev
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  noble:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev
    packages_uninstall:
      - ubuntu-session
      - language-selector-gnome

  plucky:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev
    packages_remove:
      # pavumeter was dropped from the Ubuntu plucky archive
      - pavumeter
    packages_uninstall:
      - ubuntu-session
      - language-selector-gnome
