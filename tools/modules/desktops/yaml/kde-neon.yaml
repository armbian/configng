name: kde-neon
description: "KDE Neon - latest Plasma from KDE repos (Ubuntu only)"
display_manager: sddm
status: unsupported
repo:
  url: "http://archive.neon.kde.org/testing"
  key_url: "https://archive.neon.kde.org/public.key"
  keyring: "/usr/share/keyrings/neon.gpg"

packages:
  - neon-desktop
  - sddm
  - sddm-theme-breeze
  - konsole
  - dolphin
  - bluedevil
  - kscreen
  - plasma-discover
  - plasma-nm
  - plasma-pa
  - plasma-vault
  - pipewire-audio
  - pipewire-pulse
  - wireplumber
  - scdaemon

packages_uninstall:
  # IMPORTANT: do NOT list anything here that is a Depends of
  # neon-desktop. Removing such a package triggers apt's autoremove
  # cascade which yanks neon-desktop and a large chunk of the
  # plasma stack along with it (same class of bug as the
  # xfce4-goodies and language-selector-gnome cascades fixed
  # earlier). neon-desktop Depends on kdeconnect and khelpcenter,
  # so neither can be listed here.
  #
  # gnome-keyring is also unsafe — several KDE/GTK apps pull it
  # via pam dependencies on noble.
  #
  # libreoffice* is bash glob syntax, not apt — apt doesn't expand
  # globs, and bash will glob in the cwd before passing it through.
  # If we want to drop libreoffice we have to enumerate the binary
  # package names explicitly.
  - gnome-software
  - thunderbird

releases:
  noble:
    architectures: [arm64, amd64]

  plucky:
    architectures: [arm64, amd64]
