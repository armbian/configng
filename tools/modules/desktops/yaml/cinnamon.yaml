name: cinnamon
description: "Cinnamon - traditional layout with modern features"
display_manager: lightdm
status: supported

tiers:
  minimal:
    packages:
      - cinnamon
      - cinnamon-desktop-environment
      - slick-greeter
      - blueman
      - bluez
      - bluez-tools
      - network-manager-gnome
      - dbus-x11
      - dmz-cursor-theme
      - evince
      - fonts-ubuntu
      - gnome-disk-utility
      - gnome-system-monitor
      - gtk2-engines
      - gtk2-engines-murrine
      - gtk2-engines-pixbuf
      - gvfs-backends
      - libpam-gnome-keyring
      - lm-sensors
      - numix-gtk-theme
      - numix-icon-theme
      - numix-icon-theme-circle
      - pavucontrol
      - printer-driver-all
      - pulseaudio
      - pulseaudio-module-bluetooth
      - spice-vdagent
      - system-config-printer
      - viewnior
      - xdg-user-dirs
      - xdg-user-dirs-gtk

releases:
  bookworm:
    architectures: [arm64, amd64]
    packages:
      - accountsservice
      - libu2f-udev

  trixie:
    architectures: [arm64, amd64, riscv64]
    packages:
      - accountsservice
      - libu2f-udev
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  noble:
    architectures: [arm64, amd64, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev
    packages_uninstall:
      - ubuntu-session

  forky:
    # Debian 14 — pipewire replaces pulseaudio (same as trixie).
    # armhf excluded: cinnamon-desktop-environment has no armhf build.
    architectures: [arm64, amd64, riscv64]
    packages:
      - accountsservice
      - libu2f-udev
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  sid:
    # Debian unstable — pipewire replaces pulseaudio (same as trixie/forky).
    # armhf excluded (same as forky). loong64 is a sid-only Armbian arch.
    architectures: [arm64, amd64, riscv64, loong64]
    packages:
      - accountsservice
      - libu2f-udev
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  # ── Ubuntu 22.04 LTS / 25.10 / 26.04 ──────────────────────────────

  jammy:
    # Ubuntu 22.04 LTS — polkit split available via SRU;
    # pulseaudio remains default on jammy. armhf excluded (same as noble).
    architectures: [arm64, amd64, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev
    packages_uninstall:
      - ubuntu-session

  resolute:
    # Ubuntu 26.04 LTS — same as questing; pavumeter still absent.
    architectures: [arm64, amd64, riscv64]
    packages:
      - polkitd
      - pkexec
    packages_remove:
      # pavumeter remains absent from the Ubuntu archive (dropped in plucky).
      - pavumeter
    packages_uninstall:
      - ubuntu-session
