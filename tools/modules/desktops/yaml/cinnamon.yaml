name: cinnamon
description: "Cinnamon - traditional layout with modern features"
display_manager: lightdm
status: supported

packages:
  - cinnamon
  - cinnamon-desktop-environment
  - slick-greeter
  - blueman
  - bluez
  - bluez-tools
  - network-manager-gnome
  - dbus-x11
  - dmz-cursor-theme
  - evince
  - fonts-ubuntu
  - gnome-disk-utility
  - gnome-system-monitor
  - gtk2-engines
  - gtk2-engines-murrine
  - gtk2-engines-pixbuf
  - gvfs-backends
  - libpam-gnome-keyring
  - lm-sensors
  - numix-gtk-theme
  - numix-icon-theme
  - numix-icon-theme-circle
  - pavucontrol
  - printer-driver-all
  - pulseaudio
  - pulseaudio-module-bluetooth
  - spice-vdagent
  - system-config-printer
  - viewnior
  - xdg-user-dirs
  - xdg-user-dirs-gtk

releases:
  bookworm:
    architectures: [arm64, amd64, armhf]
    packages:
      - accountsservice
      - gnome-calculator
      - libu2f-udev
    packages_remove:
      - libfontembed1
      - update-manager
      - update-manager-core

  trixie:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - accountsservice
      - libu2f-udev
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  noble:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev
    packages_remove:
      - qalculate-gtk
      - hplip
      - indicator-printers
      - libfontembed1
      - policykit-1
      - printer-driver-all
    packages_uninstall:
      - ubuntu-session
      - language-selector-gnome

  plucky:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev
    packages_remove:
      - qalculate-gtk
      - hplip
      - indicator-printers
      - libfontembed1
      - policykit-1
      - printer-driver-all
      - pavumeter
    packages_uninstall:
      - ubuntu-session
      - language-selector-gnome
