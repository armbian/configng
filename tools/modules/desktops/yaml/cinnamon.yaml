name: cinnamon
description: "Cinnamon - traditional layout with modern features"
display_manager: lightdm
status: supported

tiers:
  minimal:
    packages:
      - cinnamon
      - cinnamon-desktop-environment
      - slick-greeter
      - blueman
      - bluez
      - bluez-tools
      - network-manager-gnome
      - dbus-x11
      - dmz-cursor-theme
      - evince
      - fonts-ubuntu
      - gnome-disk-utility
      - gnome-system-monitor
      - gtk2-engines
      - gtk2-engines-murrine
      - gtk2-engines-pixbuf
      - gvfs-backends
      - libpam-gnome-keyring
      - lm-sensors
      - numix-gtk-theme
      - numix-icon-theme
      - numix-icon-theme-circle
      - pavucontrol
      - printer-driver-all
      - pulseaudio
      - pulseaudio-module-bluetooth
      - spice-vdagent
      - system-config-printer
      - viewnior
      - xdg-user-dirs
      - xdg-user-dirs-gtk

releases:
  bookworm:
    architectures: [arm64, amd64]
    packages:
      - accountsservice
      - libu2f-udev

  trixie:
    architectures: [arm64, amd64, riscv64]
    packages:
      - accountsservice
      - libu2f-udev
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  noble:
    architectures: [arm64, amd64, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev
    packages_uninstall:
      - ubuntu-session

  plucky:
    architectures: [arm64, amd64, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev
    packages_remove:
      - pavumeter
    packages_uninstall:
      - ubuntu-session

  resolute:
    architectures: [arm64, amd64, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev
    packages_remove:
      # pavumeter was dropped from the Ubuntu plucky archive; assume resolute continues this.
      - pavumeter
    packages_uninstall:
      - ubuntu-session
