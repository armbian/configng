name: enlightenment
description: "Enlightenment - EFL-based desktop"
display_manager: lightdm
status: supported

packages:
  - enlightenment
  - terminology
  - lightdm
  - slick-greeter
  - xserver-xorg
  - bluez
  - dbus-x11
  - gvfs-backends
  - lm-sensors
  - pavucontrol
  - pulseaudio
  - pulseaudio-module-bluetooth
  - thunar
  - xdg-user-dirs

releases:
  bookworm:
    architectures: [arm64, amd64, armhf]
    packages:
      - accountsservice
      - libu2f-udev

  trixie:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - accountsservice
      - libu2f-udev
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  noble:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev

  plucky:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev
