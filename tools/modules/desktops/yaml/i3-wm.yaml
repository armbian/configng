name: i3-wm
description: "i3 - lightweight tiling window manager"
display_manager: lightdm
status: supported

tiers:
  minimal:
    packages:
      - i3
      - i3status
      - i3lock
      - lightdm
      - slick-greeter
      - xserver-xorg
      - xinit
      - dbus-x11
      - dmz-cursor-theme
      - dunst
      - feh
      - fonts-ubuntu
      - gtk2-engines
      - gtk2-engines-murrine
      - gtk2-engines-pixbuf
      - lm-sensors
      - network-manager-gnome
      - numix-gtk-theme
      - numix-icon-theme
      - numix-icon-theme-circle
      - pavucontrol
      - pulseaudio
      - pulseaudio-module-bluetooth
      - rofi
      - thunar
      - xdg-user-dirs

releases:
  bookworm:
    architectures: [arm64, amd64, armhf]
    packages:
      - accountsservice
      - libu2f-udev

  trixie:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - accountsservice
      - libu2f-udev
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  noble:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev

  plucky:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev
    packages_remove:
      - pavumeter

  # ── Debian 14 / Debian Sid ─────────────────────────────────────────

  forky:
    # Debian 14 — pipewire replaces pulseaudio (same as trixie).
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - accountsservice
      - libu2f-udev
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  sid:
    # Debian unstable — pipewire replaces pulseaudio (same as trixie/forky).
    # Includes loong64, which is a sid-only Armbian arch.
    architectures: [arm64, amd64, armhf, riscv64, loong64]
    packages:
      - accountsservice
      - libu2f-udev
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  # ── Ubuntu 22.04 LTS / 25.10 / 26.04 ──────────────────────────────

  jammy:
    # Ubuntu 22.04 LTS — polkit split available via SRU;
    # pulseaudio remains default on jammy.
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev

  questing:
    # Ubuntu 25.10 — same as plucky; pavumeter absent from archive.
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev
    packages_remove:
      # pavumeter was dropped from Ubuntu in plucky and stays absent.
      - pavumeter

  resolute:
    # Ubuntu 26.04 LTS — same as questing; pavumeter still absent.
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev
    packages_remove:
      # pavumeter remains absent from the Ubuntu archive (dropped in plucky).
      - pavumeter
