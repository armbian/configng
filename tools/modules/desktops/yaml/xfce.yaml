name: xfce
description: "XFCE - lightweight and fast desktop"
display_manager: lightdm
status: supported

# Minimal tier: the DE itself + display manager + base utilities.
# Mid and full tier additions live in common.yaml; xfce inherits them
# all without override. See common.yaml `tiers.mid` / `tiers.full`.
tiers:
  minimal:
    packages:
      - xfce4
      - xfce4-goodies
      - xfce4-power-manager
      - lightdm
      - slick-greeter
      - xserver-xorg
      - blueman
      - bluez
      - bluez-tools
      - dbus-x11
      - dmz-cursor-theme
      - evince
      - fonts-ubuntu
      - gnome-disk-utility
      - gtk2-engines
      - gtk2-engines-murrine
      - gtk2-engines-pixbuf
      - gvfs-backends
      - libpam-gnome-keyring
      - lm-sensors
      - mousepad
      - numix-gtk-theme
      - numix-icon-theme
      - numix-icon-theme-circle
      - pavucontrol
      - pulseaudio
      - pulseaudio-module-bluetooth
      - printer-driver-all
      - system-config-printer
      - thunar-volman
      - viewnior
      - xdg-user-dirs
      - xdg-user-dirs-gtk

releases:
  bookworm:
    architectures: [arm64, amd64, armhf]
    packages:
      - accountsservice
      - libu2f-udev

  trixie:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - accountsservice
      - libu2f-udev
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  noble:
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev
    packages_uninstall:
      # Removing ubuntu-session strips the Ubuntu desktop branding
      # session from gdm. Do NOT add language-selector-gnome here:
      # gnome-control-center has a hard dependency on it, so apt
      # would yank gnome-control-center along with it.
      - ubuntu-session

  forky:
    # Debian 14 — pipewire replaces pulseaudio (same as trixie).
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - accountsservice
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  sid:
    # Debian unstable — pipewire replaces pulseaudio (same as trixie/forky).
    # Includes loong64, which is a sid-only Armbian arch.
    architectures: [arm64, amd64, armhf, riscv64, loong64]
    packages:
      - accountsservice
      - libu2f-udev
      - pipewire-audio
      - pipewire-pulse
      - wireplumber
    packages_remove:
      - pulseaudio
      - pulseaudio-module-bluetooth

  # ── Ubuntu 22.04 LTS / 25.10 / 26.04 ──────────────────────────────

  jammy:
    # Ubuntu 22.04 LTS — polkit split is available via SRU;
    # pulseaudio remains the default audio stack on jammy.
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libu2f-udev
    packages_uninstall:
      - ubuntu-session

  resolute:
    # Ubuntu 26.04 LTS — same as questing; pavumeter still absent.
    architectures: [arm64, amd64, armhf, riscv64]
    packages:
      - polkitd
      - pkexec
      - libfido2-1
    packages_remove:
      # pavumeter remains absent from the Ubuntu archive (dropped in plucky).
      - pavumeter
    packages_uninstall:
      - ubuntu-session
