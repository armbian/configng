name: "Maintenance: Unit tests"
on:
  workflow_dispatch:
  repository_dispatch:
    types: ["Unit tests"]
  schedule:
    - cron: '0 2 * * *'
  pull_request:
    types: [opened, reopened, edited, synchronize, review_requested]

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PR_NUMBER: ${{ github.event.number }}
  REPOSITORY: "apt.armbian.com"

concurrency:
  group: pipeline-pr-${{github.event.pull_request.number}}
  cancel-in-progress: false

jobs:

  prepare:
    name: "Armbian configurator unit tests"
    runs-on: "ubuntu-24.04"
    outputs:
      DEPLOYMENT_MATRIX: "${{ steps.json.outputs.DEPLOYMENT_MATRIX }}"
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
              tests/*.conf
          separator: "\n"

      - name: "Make JSON ${{ steps.changed-files.outputs.all_changed_files }}"
        id: json
        run: |

          delimiter="$(openssl rand -hex 8)"
          echo "DEPLOYMENT_MATRIX<<${delimiter}" >> "${GITHUB_OUTPUT}"

          # Run each enabled test case against both amd64 and arm64 runners
          # using the matching arch-specific Armbian image tag. The
          # armbian/docker-armbian-build pipeline publishes a
          # single-platform manifest per <release>-<arch> tag, so the
          # runner arch and the image tag arch must match exactly.
          releases=("bookworm" "trixie" "forky" "jammy" "noble" "resolute")
          arches=("amd64" "arm64")
          declare -A runner_for_arch=(
            ["amd64"]="ubuntu-24.04"
            ["arm64"]="ubuntu-24.04-arm"
          )

          # read tests cases
          # Run all tests on schedule, workflow_dispatch on main, or when no files changed
          run_all_tests=false
          if [[ "${{ github.event_name }}" == "schedule" ]] || [[ "${{ github.ref_name }}" == "main" && "${{ github.event_name }}" == "workflow_dispatch" ]] || [[ "${{ steps.changed-files.outputs.any_changed }}" != "true" ]]; then
              run_all_tests=true
          fi

          if [[ "$run_all_tests" == "true" ]]; then
              tests=($(grep -rwl tests/*.conf -e "ENABLED=true" | cut -d":" -f1))
          else
              # Get changed test files using git to avoid parsing issues
              changed_tests=($(cd "${GITHUB_WORKSPACE}" && git diff --name-only origin/main...HEAD | grep '^tests/.*\.conf$' || true))
              if [[ ${#changed_tests[@]} -gt 0 ]]; then
                  # Filter for ENABLED=true
                  tests=($(grep -rwl -e "ENABLED=true" -- "${changed_tests[@]}" 2>/dev/null | cut -d":" -f1))
              else
                  tests=()
              fi
          fi

          # Emit one matrix entry per (test × release × arch). Each
          # entry carries the runner label and the fully-qualified image
          # tag, consumed by the gradle job below.
          emit_entry() {
              local pkg="$1" testname="$2" os="$3" testid="$4" arch="$5"
              local image="ghcr.io/armbian/repository-update:${os}-${arch}"
              local runner="${runner_for_arch[$arch]}"
              echo "{\"package\":\"${pkg}\",\"name\":\"${testname}\",\"os\":\"${os}\",\"arch\":\"${arch}\",\"runner\":\"${runner}\",\"id\":\"${testid}\",\"docker_image\":\"${image}\"}"
          }

          for i in "${tests[@]}"; do
             unset RELEASE
             source "${i}"
             if [[ -z "${RELEASE}" || "${RELEASE}" == "all" ]]; then RELEASE=all; fi
             testid=$(echo "$i" | cut -d"/" -f2 | cut -d"." -f1)
             if [[ $RELEASE != "all" ]]; then
                # Colon-separated release allow-list (e.g. RELEASE="noble:trixie")
                elements=($(echo "$RELEASE" | tr ':' "\n"))
                for j in "${releases[@]}"; do
                    for SELECTED_RELEASE in "${elements[@]}"; do
                        if [[ $j == *"${SELECTED_RELEASE}"* ]]; then
                           for arch in "${arches[@]}"; do
                              emit_entry "${i}" "${TESTNAME}" "${j}" "${testid}" "${arch}"
                           done
                        fi
                    done
                done
             else
                for j in "${releases[@]}"; do
                    for arch in "${arches[@]}"; do
                       emit_entry "${i}" "${TESTNAME}" "${j}" "${testid}" "${arch}"
                    done
                done
             fi
          done | jq -s >> $GITHUB_OUTPUT
          echo "${delimiter}" >> "${GITHUB_OUTPUT}"

  gradle:
    needs: prepare
    if: ${{ needs.prepare.outputs.DEPLOYMENT_MATRIX != '[]' }}
    strategy:
      fail-fast: false
      max-parallel: 128
      matrix:
        server: ${{ fromJSON(needs.prepare.outputs.DEPLOYMENT_MATRIX) }}
    name: "${{ matrix.server.name }} (${{ matrix.server.os }}/${{ matrix.server.arch }})"
    runs-on: ${{ matrix.server.runner }}
    timeout-minutes: 60
    container:
      image: ${{ matrix.server.docker_image }}
      options: --privileged --security-opt seccomp=unconfined --tmpfs /tmp --tmpfs /run --tmpfs /run/lock
      env:
        DBUS_SESSION_BUS_ADDRESS: unix:path=/run/bus/bus.sock
    steps:

      - name: "Initialize systemd"
        run: |
          # Start systemd in the container
          /sbin/init &
          sleep 5
          # Make the container appear as if systemd is PID 1
          export SYSTEMD_IGNORE_CHROOT=1
          export container=docker

      - name: "Checkout Armbian configuration tool"
        uses: actions/checkout@v6
        with:
          path: 'config'

      - name: "Run unit test: ${{ matrix.server.name }} via ${{ matrix.server.package }}"
        shell: bash
        run: |
          export TERM=linux
          rm -rf test; mkdir -p test
          cd config
          # assemble armbian config
          bash tools/config-assemble.sh -p
          # read test
          source "${{ matrix.server.package }}"

          # Test case execution
          start_time=$(date +%s)
          figlet  "RUN TEST CASE"
          testcase
          finish_time=$(date +%s)

          # Generate table entry
          echo "|${{ matrix.server.os }}| ${{ matrix.server.arch }} | ${{ matrix.server.name }} | $((finish_time - start_time)) sec |" > ../test/${{ matrix.server.id }}-${{ matrix.server.os }}-${{ matrix.server.arch }}

      - name: "Upload test summary"
        uses: actions/upload-artifact@v7
        with:
          name: test-${{ matrix.server.id }}-${{ matrix.server.os }}-${{ matrix.server.arch }}
          path: test
          if-no-files-found: ignore

  stop:
    name: "Merge test artifacts"
    if: always()
    needs: gradle
    runs-on: ubuntu-24.04
    steps:

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: test
          pattern: test-*
          merge-multiple: true

      - name: Install
        run: |

          echo "# Succesful tests:" >> $GITHUB_STEP_SUMMARY
          echo "|Release|Arch|Test name|Duration|" >> $GITHUB_STEP_SUMMARY
          echo "|:---|:---|:---|---:|" >> $GITHUB_STEP_SUMMARY
          cat test/* | sed '$ s/.$//' >> $GITHUB_STEP_SUMMARY

      - uses: geekyeggo/delete-artifact@v6
        with:
          name: |
            test-*
