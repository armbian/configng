# bookworm-specific companion to XFCE01. Kept as a separate file so
# XFCE01 can stay on a clean trixie+ RELEASE set that lines up with
# riscv64 availability. bookworm's xfce YAML declares
# [arm64, amd64, armhf] (no riscv64 port) — reflect that in TESTARCH.
ENABLED=true
RELEASE="bookworm"
TESTARCH="arm64,amd64,armhf"
TESTNAME="XFCE desktop"

testcase() {(
	set -e
	./bin/armbian-config --api module_desktops install de=xfce tier=full
	./bin/armbian-config --api module_desktops remove  de=xfce
)}
