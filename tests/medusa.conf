ENABLED=true
RELEASE="noble"
TESTARCH="arm64,amd64"
TESTNAME="Medusa install"

testcase() {(
	set -e
	./bin/armbian-config --api module_medusa purge
	./bin/armbian-config --api module_medusa install
	./bin/armbian-config --api module_medusa status
	./bin/armbian-config --api module_medusa purge
)}


