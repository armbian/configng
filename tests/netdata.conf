ENABLED=true
RELEASE="noble"
TESTARCH="arm64,amd64"
TESTNAME="Netdata install"

testcase() {(
	set -e
	./bin/armbian-config --api module_netdata purge
	./bin/armbian-config --api module_netdata install
	./bin/armbian-config --api module_netdata status
	./bin/armbian-config --api module_netdata purge
)}


