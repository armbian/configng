ENABLED=true
RELEASE="bookworm:trixie:noble"
TESTNAME="XFCE desktop install and remove"

testcase() {(
	set -e
	./bin/armbian-config --api module_desktop install de=xfce
	./bin/armbian-config --api module_desktop status de=xfce
	[ -f /etc/armbian/desktop/xfce.packages ]
	./bin/armbian-config --api module_desktop remove de=xfce
	! ./bin/armbian-config --api module_desktop status de=xfce
)}
