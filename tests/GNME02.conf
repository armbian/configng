# bookworm-specific companion to GNME01. GNOME's bookworm YAML only
# declares [arm64, amd64] — armhf and riscv64 aren't available on
# bookworm for this DE, so TESTARCH is narrower than the trixie+
# file's arch set.
ENABLED=true
RELEASE="bookworm"
TESTARCH="arm64,amd64"
TESTNAME="GNOME desktop"

testcase() {(
	set -e
	./bin/armbian-config --api module_desktops install de=gnome tier=full
	./bin/armbian-config --api module_desktops remove  de=gnome
)}
