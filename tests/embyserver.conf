ENABLED=true
RELEASE="noble"
TESTARCH="arm64,amd64"
TESTNAME="EmbyServer install"

testcase() {(
	set -e
	./bin/armbian-config --api module_embyserver purge
	./bin/armbian-config --api module_embyserver install
	./bin/armbian-config --api module_embyserver status
	./bin/armbian-config --api module_embyserver purge
)}


