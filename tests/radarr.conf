ENABLED=true
RELEASE="noble"
TESTARCH="arm64,amd64"
TESTNAME="Radarr install"

testcase() {(
	set -e
	./bin/armbian-config --api module_radarr purge
	./bin/armbian-config --api module_radarr install
	./bin/armbian-config --api module_radarr status
	./bin/armbian-config --api module_radarr purge
)}


