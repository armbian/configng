ENABLED=true
RELEASE="noble"
TESTARCH="arm64,amd64"
TESTNAME="Owncloud install"

testcase() {(
	set -e
	./bin/armbian-config --api module_owncloud purge
	./bin/armbian-config --api module_owncloud install
	sleep 10
	./bin/armbian-config --api module_owncloud status
	./bin/armbian-config --api module_owncloud purge
)}


