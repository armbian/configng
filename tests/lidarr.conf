ENABLED=true
RELEASE="noble"
TESTARCH="arm64,amd64"
TESTNAME="Lidarr install"

testcase() {(
	set -e
	./bin/armbian-config --api module_lidarr purge
	./bin/armbian-config --api module_lidarr install
	./bin/armbian-config --api module_lidarr status
	./bin/armbian-config --api module_lidarr purge
)}


