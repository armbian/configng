ENABLED=true
RELEASE="noble"
TESTARCH="arm64,amd64"
TESTNAME="Navidrome install"

testcase() {(
	set -e
	./bin/armbian-config --api module_navidrome purge
	./bin/armbian-config --api module_navidrome install
	./bin/armbian-config --api module_navidrome status
	./bin/armbian-config --api module_navidrome purge
)}


