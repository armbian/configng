ENABLED=true
RELEASE="noble"
TESTARCH="arm64,amd64"
TESTNAME="PhpMyAdmin install"

testcase() {(
	set -e
	./bin/armbian-config --api module_phpmyadmin purge
	./bin/armbian-config --api module_phpmyadmin install
	./bin/armbian-config --api module_phpmyadmin status
	./bin/armbian-config --api module_phpmyadmin purge
)}


