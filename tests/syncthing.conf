ENABLED=true
RELEASE="noble"
TESTARCH="arm64,amd64"
TESTNAME="Syncthing install"

testcase() {(
	set -e
	./bin/armbian-config --api module_syncthing purge
	./bin/armbian-config --api module_syncthing install
	./bin/armbian-config --api module_syncthing status
	./bin/armbian-config --api module_syncthing purge
)}


