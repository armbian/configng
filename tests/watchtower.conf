ENABLED=true
RELEASE="noble"
TESTARCH="arm64,amd64"
TESTNAME="Watchtower install"

testcase() {(
	set -e
	./bin/armbian-config --api module_watchtower purge
	./bin/armbian-config --api module_watchtower install
	./bin/armbian-config --api module_watchtower status
	./bin/armbian-config --api module_watchtower purge
)}


